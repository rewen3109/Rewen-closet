<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewen 的衣櫃 - 編輯功能版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F7F4; color: #4A4A4A; }
        .btn-primary { background-color: #A89F91; color: white; }
        .btn-outline { border: 1px solid #E5E7EB; color: #9CA3AF; background-color: white; }
        .btn-active { border-color: #A89F91; color: #A89F91; background-color: #FAF9F6; font-weight: 500; }
        
        .image-container {
            width: 100%;
            aspect-ratio: 3 / 4;
            overflow: hidden;
            position: relative;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); overflow: hidden; }
        .tag { background-color: #F0EEE9; color: #7D7468; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="p-6 text-center bg-white border-b border-gray-100 sticky top-0 z-20">
        <h1 class="text-xl font-medium tracking-widest uppercase text-[#7D7468]">Rewen's Closet</h1>
        <div class="flex justify-center space-x-3 mt-3">
            <button onclick="exportBackup()" class="text-[9px] border border-gray-200 text-gray-400 px-3 py-1 rounded-full bg-white shadow-sm">📤 備份資料</button>
            <label class="text-[9px] border border-gray-200 text-gray-400 px-3 py-1 rounded-full cursor-pointer bg-white shadow-sm">
                📥 匯入資料 <input type="file" id="importFile" class="hidden" accept=".json" onchange="importBackup(this)">
            </label>
        </div>
    </header>

    <!-- 雙重過濾區域 -->
    <div class="sticky top-[105px] z-10 bg-[#F8F7F4] pt-2 pb-3 shadow-sm px-4 space-y-3">
        <div class="flex overflow-x-auto space-x-2 no-scrollbar" id="mainFilterContainer">
            <button onclick="setMainFilter('all')" data-cat="all" class="filter-main flex-shrink-0 px-4 py-1.5 rounded-full text-sm btn-active">全部</button>
            <button onclick="setMainFilter('上衣')" data-cat="上衣" class="filter-main flex-shrink-0 px-4 py-1.5 rounded-full text-sm btn-outline">上衣</button>
            <button onclick="setMainFilter('下衣')" data-cat="下衣" class="filter-main flex-shrink-0 px-4 py-1.5 rounded-full text-sm btn-outline">下衣</button>
            <button onclick="setMainFilter('裙子')" data-cat="裙子" class="filter-main flex-shrink-0 px-4 py-1.5 rounded-full text-sm btn-outline">裙子</button>
            <button onclick="setMainFilter('洋裝')" data-cat="洋裝" class="filter-main flex-shrink-0 px-4 py-1.5 rounded-full text-sm btn-outline">洋裝</button>
            <button onclick="setMainFilter('外套')" data-cat="外套" class="filter-main flex-shrink-0 px-4 py-1.5 rounded-full text-sm btn-outline">外套</button>
            <button onclick="setMainFilter('運動')" data-cat="運動" class="filter-main flex-shrink-0 px-4 py-1.5 rounded-full text-sm btn-outline">運動</button>
        </div>

        <div class="flex overflow-x-auto space-x-2 no-scrollbar border-t border-gray-100 pt-3">
            <span class="text-[10px] text-gray-400 flex items-center pr-1">季節:</span>
            <button onclick="setSeasonFilter('all')" data-season="all" class="filter-season flex-shrink-0 text-[11px] px-3 py-1 rounded-md border border-gray-200 bg-white text-gray-500">全部</button>
            <button onclick="setSeasonFilter('春')" data-season="春" class="filter-season flex-shrink-0 text-[11px] px-3 py-1 rounded-md border border-gray-200 bg-white text-gray-500">春</button>
            <button onclick="setSeasonFilter('夏')" data-season="夏" class="filter-season flex-shrink-0 text-[11px] px-3 py-1 rounded-md border border-gray-200 bg-white text-gray-500">夏</button>
            <button onclick="setSeasonFilter('秋')" data-season="秋" class="filter-season flex-shrink-0 text-[11px] px-3 py-1 rounded-md border border-gray-200 bg-white text-gray-500">秋</button>
            <button onclick="setSeasonFilter('冬')" data-season="冬" class="filter-season flex-shrink-0 text-[11px] px-3 py-1 rounded-md border border-gray-200 bg-white text-gray-500">冬</button>
        </div>
    </div>

    <!-- 衣櫃網格 -->
    <main class="px-4 grid grid-cols-2 gap-4 mt-2" id="closetGrid"></main>

    <!-- 新增按鈕 -->
    <button onclick="openAddModal()" class="fixed bottom-8 right-6 w-14 h-14 btn-primary rounded-full shadow-lg flex items-center justify-center text-3xl font-light">+</button>

    <!-- 上傳/編輯彈窗 -->
    <div id="uploadModal" class="fixed inset-0 bg-black/40 hidden z-50 flex items-end">
        <div class="bg-white w-full rounded-t-3xl p-6 max-h-[92vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-lg font-medium">新增衣物單品</h2>
                <button onclick="toggleModal(false)" class="text-gray-400 text-2xl">&times;</button>
            </div>

            <div class="space-y-5">
                <div class="border-2 border-dashed border-gray-200 rounded-xl image-container flex flex-col items-center justify-center relative overflow-hidden bg-gray-50">
                    <input type="file" id="itemImage" accept="image/*" class="absolute inset-0 opacity-0 z-10" onchange="handleImage(this)">
                    <img id="imagePreview" class="hidden absolute inset-0 w-full h-full object-cover">
                    <div id="uploadPlaceholder" class="text-center">
                        <span class="text-gray-400 text-sm block">點擊拍攝/選擇照片</span>
                        <span class="text-[10px] text-gray-300">3:4 比例效果最佳</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] text-gray-400 mb-1 ml-1">主類別</label>
                        <select id="mainCat" onchange="updateSubCat()" class="w-full bg-gray-50 border-none rounded-lg p-3 text-sm">
                            <option value="上衣">上衣</option>
                            <option value="下衣">下衣</option>
                            <option value="裙子">裙子</option>
                            <option value="洋裝">洋裝</option>
                            <option value="外套">外套</option>
                            <option value="運動">運動</option>
                            <option value="內著">內著</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] text-gray-400 mb-1 ml-1">細分</label>
                        <select id="subCat" class="w-full bg-gray-50 border-none rounded-lg p-3 text-sm"></select>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] text-gray-400 mb-2 ml-1">適合季節 (複選)</label>
                    <div class="flex justify-between px-2">
                        <label class="text-sm"><input type="checkbox" name="season" value="春"> 春</label>
                        <label class="text-sm"><input type="checkbox" name="season" value="夏"> 夏</label>
                        <label class="text-sm"><input type="checkbox" name="season" value="秋"> 秋</label>
                        <label class="text-sm"><input type="checkbox" name="season" value="冬"> 冬</label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="itemSize" placeholder="尺寸" class="w-full bg-gray-50 border-none rounded-lg p-3 text-sm">
                    <input type="text" id="itemSource" placeholder="購買來源" class="w-full bg-gray-50 border-none rounded-lg p-3 text-sm">
                    <input type="number" id="itemPrice" placeholder="價格" class="w-full bg-gray-50 border-none rounded-lg p-3 text-sm col-span-2">
                </div>

                <button id="saveBtn" onclick="saveToCloset()" class="w-full btn-primary py-4 rounded-xl font-medium mt-4 shadow-md">加入衣櫃</button>
            </div>
        </div>
    </div>

    <script>
        let clothes = JSON.parse(localStorage.getItem('rewenCloset')) || [];
        let currentResizedBase64 = "";
        let editingId = null; // 紀錄正在編輯的衣服 ID
        
        let activeMainFilter = 'all';
        let activeSeasonFilter = 'all';

        function toggleModal(show) {
            document.getElementById('uploadModal').classList.toggle('hidden', !show);
        }

        function openAddModal() {
            editingId = null;
            resetForm();
            document.getElementById('modalTitle').innerText = "新增衣物單品";
            document.getElementById('saveBtn').innerText = "加入衣櫃";
            updateSubCat();
            toggleModal(true);
        }

        function openEditModal(id) {
            const item = clothes.find(i => i.id === id);
            if (!item) return;

            editingId = id;
            document.getElementById('modalTitle').innerText = "編輯衣物資訊";
            document.getElementById('saveBtn').innerText = "儲存修改";
            
            // 填入資料
            currentResizedBase64 = item.img;
            document.getElementById('imagePreview').src = item.img;
            document.getElementById('imagePreview').classList.remove('hidden');
            document.getElementById('uploadPlaceholder').classList.add('hidden');
            
            document.getElementById('mainCat').value = item.mainCat;
            updateSubCat();
            document.getElementById('subCat').value = item.subCat;
            
            // 勾選季節
            document.querySelectorAll('input[name="season"]').forEach(cb => {
                cb.checked = item.seasons.includes(cb.value);
            });
            
            document.getElementById('itemSize').value = item.size === '-' ? "" : item.size;
            document.getElementById('itemSource').value = item.source === '-' ? "" : item.source;
            document.getElementById('itemPrice').value = item.price === '-' ? "" : item.price;
            
            toggleModal(true);
        }

        // 過濾器邏輯
        function setMainFilter(cat) {
            activeMainFilter = cat;
            document.querySelectorAll('.filter-main').forEach(btn => {
                btn.classList.replace('btn-active', 'btn-outline');
            });
            const activeBtn = document.querySelector(`.filter-main[data-cat="${cat}"]`);
            activeBtn.classList.replace('btn-outline', 'btn-active');
            renderCloset();
        }

        function setSeasonFilter(season) {
            activeSeasonFilter = season;
            document.querySelectorAll('.filter-season').forEach(btn => {
                btn.classList.remove('bg-[#A89F91]', 'text-white', 'border-[#A89F91]');
                btn.classList.add('bg-white', 'text-gray-500', 'border-gray-200');
            });
            const activeBtn = document.querySelector(`.filter-season[data-season="${season}"]`);
            activeBtn.classList.add('bg-[#A89F91]', 'text-white', 'border-[#A89F91]');
            renderCloset();
        }

        function renderCloset() {
            const grid = document.getElementById('closetGrid');
            grid.innerHTML = '';

            const filteredItems = clothes.filter(item => {
                const mainMatch = (activeMainFilter === 'all' || item.mainCat === activeMainFilter);
                const seasonMatch = (activeSeasonFilter === 'all' || item.seasons.includes(activeSeasonFilter));
                return mainMatch && seasonMatch;
            });

            if (filteredItems.length === 0) {
                grid.innerHTML = `<p class="col-span-2 text-center text-gray-300 py-10 text-sm">尚無相符衣物</p>`;
                return;
            }

            filteredItems.forEach(item => {
                grid.innerHTML += `
                    <div class="card relative">
                        <!-- 操作按鈕區 -->
                        <div class="absolute top-2 right-2 z-10 flex space-x-1">
                            <button onclick="openEditModal(${item.id})" class="bg-white/70 w-7 h-7 rounded-full text-[10px] backdrop-blur-sm flex items-center justify-center shadow-sm">✎</button>
                            <button onclick="deleteItem(${item.id})" class="bg-white/70 w-7 h-7 rounded-full text-[10px] backdrop-blur-sm flex items-center justify-center shadow-sm">✕</button>
                        </div>
                        <div class="image-container">
                            <img src="${item.img}" loading="lazy">
                        </div>
                        <div class="p-3">
                            <p class="text-[10px] text-gray-400 mb-1">${item.mainCat} · ${item.subCat}</p>
                            <div class="flex flex-wrap gap-1 mb-2">${item.seasons.map(s => `<span class="tag">${s}</span>`).join('')}</div>
                            <div class="text-[9px] text-gray-400 border-t pt-2 mt-1">
                                <p>來源：${item.source} / 尺寸：${item.size}</p>
                                <p>加入日期：${item.date}</p>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function () {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const targetWidth = 600, targetHeight = 800;
                        canvas.width = targetWidth; canvas.height = targetHeight;
                        let srcX = 0, srcY = 0, srcW = img.width, srcH = img.height;
                        const aspectRatio = targetWidth / targetHeight;
                        if (img.width / img.height > aspectRatio) {
                            srcW = img.height * aspectRatio; srcX = (img.width - srcW) / 2;
                        } else {
                            srcH = img.width / aspectRatio; srcY = (img.height - srcH) / 2;
                        }
                        ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, targetWidth, targetHeight);
                        currentResizedBase64 = canvas.toDataURL('image/jpeg', 0.8);
                        document.getElementById('imagePreview').src = currentResizedBase64;
                        document.getElementById('imagePreview').classList.remove('hidden');
                        document.getElementById('uploadPlaceholder').classList.add('hidden');
                    }
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updateSubCat() {
            const main = document.getElementById('mainCat').value;
            const sub = document.getElementById('subCat');
            let opts = [];
            if (main === '上衣') opts = ['短袖', '長袖', '無袖'];
            else if (main === '下衣') opts = ['短褲', '長褲'];
            else if (main === '運動') opts = ['運動上衣', '運動下衣', '運動內衣', '運動外套'];
            else if (main === '內著') opts = ['內衣', '內褲', '睡衣'];
            else opts = ['一般'];
            sub.innerHTML = opts.map(o => `<option value="${o}">${o}</option>`).join('');
        }

        function saveToCloset() {
            if (!currentResizedBase64) return alert('請先拍照或上傳照片');
            const seasons = Array.from(document.querySelectorAll('input[name="season"]:checked')).map(el => el.value);
            
            const itemData = {
                id: editingId || Date.now(),
                img: currentResizedBase64,
                mainCat: document.getElementById('mainCat').value,
                subCat: document.getElementById('subCat').value,
                seasons: seasons,
                size: document.getElementById('itemSize').value || '-',
                source: document.getElementById('itemSource').value || '-',
                price: document.getElementById('itemPrice').value || '-',
                date: editingId ? (clothes.find(i => i.id === editingId).date) : new Date().toLocaleDateString()
            };

            if (editingId) {
                // 更新模式
                const index = clothes.findIndex(i => i.id === editingId);
                clothes[index] = itemData;
            } else {
                // 新增模式
                clothes.push(itemData);
            }

            localStorage.setItem('rewenCloset', JSON.stringify(clothes));
            renderCloset();
            toggleModal(false);
            resetForm();
        }

        function deleteItem(id) {
            if (confirm('確定要刪除這件衣物嗎？')) {
                clothes = clothes.filter(i => i.id !== id);
                localStorage.setItem('rewenCloset', JSON.stringify(clothes));
                renderCloset();
            }
        }

        function resetForm() {
            currentResizedBase64 = "";
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('uploadPlaceholder').classList.remove('hidden');
            document.querySelectorAll('input[name="season"]').forEach(c => c.checked = false);
            document.getElementById('itemSize').value = ""; 
            document.getElementById('itemSource').value = ""; 
            document.getElementById('itemPrice').value = "";
        }

        function exportBackup() {
            const blob = new Blob([JSON.stringify(clothes)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `Rewen_Closet_Backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importBackup(input) {
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    clothes = JSON.parse(e.target.result);
                    localStorage.setItem('rewenCloset', JSON.stringify(clothes));
                    renderCloset();
                    alert('匯入成功！');
                } catch(err) { alert('匯入失敗'); }
            };
            reader.readAsText(input.files[0]);
        }

        // 初始化
        renderCloset();
        setSeasonFilter('all');
    </script>
</body>
</html>
